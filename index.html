<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>THE LUX - AUTOHAUS SYSTEM</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e2a47, #0f172a);
    color: white;
    margin: 0;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(20,20,30,0.95);
    padding: 20px;
    font-size: 22px;
}

/* MANAGEMENT BUTTON */
.manage-btn {
    background: #444;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
}

.manage-btn:hover {
    background: #666;
}

/* LOGIN */
.login-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: rgba(20,20,30,0.9);
    padding: 40px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}

.login-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
}

/* APP */
.app { display: none; padding: 40px; }

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
    max-width: 1400px;
    margin: auto;
}

/* KARTEN */
.card {
    background: rgba(20,20,30,0.85);
    padding: 30px;
    border-radius: 15px;
    min-height: 520px;
    display: flex;
    flex-direction: column;
}

input {
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    background: #2a2a3d;
    color: white;
}

button {
    padding: 15px;
    margin-top: auto;
    border-radius: 10px;
    border: none;
    background: #3a6df0;
    color: white;
}

.discount-wrap { display:flex; gap:10px; margin-top:10px; }
.discount-wrap + .result { margin-top:25px; }

.btn-discount { flex:1; padding:10px; background:#333; }
.btn-discount.active { background:#3a6df0; }

.result { text-align:center; font-weight:bold; }

/* MANAGEMENT SCREEN */
.management {
    display: none;
    padding: 40px;
}

.log-entry {
    background: #222;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="login">
    <div class="login-box">
        <h2>Login</h2>
        <input id="user" placeholder="Benutzername">
        <input id="pass" type="password" placeholder="Passwort">
        <button onclick="loginUser()">Einloggen</button>
    </div>
</div>

<!-- APP -->
<div class="app" id="app">

<div class="header">
    🚗 Autohaus
    <div class="manage-btn" onclick="openManagement()">Management</div>
</div>

<div class="container">

<!-- ANKAUF -->
<div class="card">
<h2>🚗 Ankauf</h2>
<input id="a_auto" placeholder="Auto Name">
<input id="a_preis" type="number" placeholder="Preis (€)">
<input id="a_vor" placeholder="Vorbesitzer">
<input id="a_mit" placeholder="Mitarbeiter">
<button onclick="ankauf()">Quittung erstellen</button>
</div>

<!-- VERKAUF -->
<div class="card">
<h2>💰 Verkauf</h2>
<input id="v_auto">
<input id="v_preis" type="number" oninput="calcSale()">
<input id="v_vor">
<input id="v_mit">

<div class="discount-wrap">
<button class="btn-discount active" onclick="setDiscount(0,this)">0%</button>
<button class="btn-discount" onclick="setDiscount(25,this)">25%</button>
<button class="btn-discount" onclick="setDiscount(50,this)">50%</button>
<button class="btn-discount" onclick="setDiscount(75,this)">75%</button>
<button class="btn-discount" onclick="setDiscount(100,this)">100%</button>
</div>

<div class="result" id="endpreis">0€</div>
<button onclick="verkauf()">Speichern</button>
</div>

<!-- REPARATUR -->
<div class="card">
<h2>🔧 Reparaturkasten</h2>
<input id="r_anzahl" type="number" oninput="calcRepair()">
<input id="r_mit">

<div class="discount-wrap">
<button class="btn-discount active" onclick="setRepairDiscount(0,this)">0%</button>
<button class="btn-discount" onclick="setRepairDiscount(25,this)">25%</button>
<button class="btn-discount" onclick="setRepairDiscount(50,this)">50%</button>
<button class="btn-discount" onclick="setRepairDiscount(75,this)">75%</button>
<button class="btn-discount" onclick="setRepairDiscount(100,this)">100%</button>
</div>

<div class="result" id="r_preis">0€</div>
<button onclick="calcRepair(); saveRepair()">Quittung erstellen</button>
</div>

</div>
</div>

<!-- MANAGEMENT -->
<div class="management" id="management">
<h2>📊 Verlauf</h2>
<div id="logs"></div>
<button onclick="closeManagement()">Zurück</button>
</div>

<script>
function loginUser(){
    if(user.value==="Mitarbeiter" && pass.value==="Staff2026"){
        login.style.display="none";
        app.style.display="block";
    } else alert("Falsch!");
}

/* MANAGEMENT LOGIN */
function openManagement(){
    let pw = prompt("Management Passwort:");
    if(pw==="Vape"){
        app.style.display="none";
        management.style.display="block";
        loadLogs();
    } else alert("Falsch!");
}

function closeManagement(){
    management.style.display="none";
    app.style.display="block";
}

/* STORAGE */
function saveLog(text){
    let logs = JSON.parse(localStorage.getItem("logs")||"[]");
    logs.push(text);
    localStorage.setItem("logs", JSON.stringify(logs));
}

function loadLogs(){
    let logs = JSON.parse(localStorage.getItem("logs")||"[]");
    let container = document.getElementById("logs");
    container.innerHTML="";
    logs.forEach(l=>{
        container.innerHTML += `<div class="log-entry">${l}</div>`;
    });
}

/* FUNCTIONS */
let discount=0, repairDiscount=0;

function ankauf(){
    if(!a_auto.value||!a_preis.value) return alert("Fehlt!");
    let text=`Ankauf: ${a_auto.value} ${a_preis.value}€`;
    alert(text);
    saveLog(text);
}

function setDiscount(v,b){
    discount=v;
    document.querySelectorAll('.discount-wrap')[0].querySelectorAll('button')
    .forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    calcSale();
}

function calcSale(){
    let p=parseFloat(v_preis.value)||0;
    endpreis.innerText = p - p*discount/100 + "€";
}

function verkauf(){
    let text=`Verkauf: ${v_auto.value}`;
    alert(text);
    saveLog(text);
}

function setRepairDiscount(v,b){
    repairDiscount=v;
    document.querySelectorAll('.discount-wrap')[1].querySelectorAll('button')
    .forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    calcRepair();
}

function calcRepair(){
    let p=(r_anzahl.value||0)*4000;
    r_preis.innerText = p - p*repairDiscount/100 + "€";
}

function saveRepair(){
    let text=`Reparatur: ${r_anzahl.value} Teile`;
    saveLog(text);
}
</script>

</body>
</html>
