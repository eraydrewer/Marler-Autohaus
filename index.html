<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>THE LUX - AUTOHAUS SYSTEM</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
}

/* HEADER (iOS CLEAN) */
.header {
    background: #111a2e;
    padding: 18px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    border-bottom: 1px solid #223;
}

/* LOGIN */
.login-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: #111a2e;
    padding: 35px;
    border-radius: 12px;
    width: 300px;
}

.login-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: #1a2742;
    border: 1px solid #223;
    color: white;
    border-radius: 8px;
}

/* APP */
.app { display: none; }

/* LAYOUT */
.main {
    padding: 40px;
}

.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 1300px;
    margin: auto;
}

/* iOS STYLE CARDS */
.card {
    background: #111a2e;
    border: 1px solid #1f2a44;
    border-radius: 14px;
    padding: 20px;
}

/* TITLE */
.card h2 {
    font-size: 18px;
    margin-bottom: 15px;
    border-bottom: 1px solid #223;
    padding-bottom: 10px;
}

/* INPUTS (iOS STYLE ROWS) */
input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #223;
    background: #0f172a;
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 10px;
    border: none;
    background: #2f6fff;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* DISCOUNTS */
.discount-wrap {
    display: flex;
    gap: 6px;
    margin-top: 10px;
}

.btn-discount {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    background: #1a2742;
    border: 1px solid #223;
    cursor: pointer;
    font-size: 12px;
}

.btn-discount.active {
    background: #2f6fff;
}

/* RESULT */
.result {
    margin-top: 12px;
    text-align: center;
    font-weight: bold;
    color: #cfe1ff;
}
</style>
</head>

<body>

<div class="login-screen" id="login">
    <div class="login-box">
        <h2>Login</h2>
        <input id="user" placeholder="Benutzername">
        <input id="pass" type="password" placeholder="Passwort">
        <button onclick="loginUser()">Einloggen</button>
    </div>
</div>

<div class="app" id="app">

<div class="header">🚗 Autohaus System</div>

<div class="main">
<div class="container">

    <!-- ANKAUF -->
    <div class="card">
        <h2>Ankauf</h2>
        <input id="a_auto" placeholder="Auto Name">
        <input id="a_chip" placeholder="Chip">
        <input id="a_preis" placeholder="Preis">
        <input id="a_vor" placeholder="Vorbesitzer">
        <input id="a_mit" placeholder="Mitarbeiter">
        <button onclick="ankauf()">Quittung erstellen</button>
    </div>

    <!-- VERKAUF -->
    <div class="card">
        <h2>Verkauf</h2>
        <input id="v_auto" placeholder="Auto Name">
        <input id="v_preis" placeholder="Preis" oninput="calcSale()">
        <input id="v_vor" placeholder="Vorbesitzer">
        <input id="v_mit" placeholder="Mitarbeiter">

        <div class="discount-wrap">
            <button class="btn-discount active" onclick="setDiscount(0,this)">0%</button>
            <button class="btn-discount" onclick="setDiscount(25,this)">25%</button>
            <button class="btn-discount" onclick="setDiscount(50,this)">50%</button>
            <button class="btn-discount" onclick="setDiscount(75,this)">75%</button>
            <button class="btn-discount" onclick="setDiscount(100,this)">100%</button>
        </div>

        <div class="result" id="endpreis">0€</div>

        <button onclick="verkauf()">Speichern</button>
    </div>

    <!-- REPARATUR -->
    <div class="card">
        <h2>Reparaturkasten</h2>
        <input id="r_anzahl" placeholder="Anzahl" oninput="calcRepair()">
        <input id="r_mit" placeholder="Mitarbeiter">

        <div class="discount-wrap">
            <button class="btn-discount active" onclick="setRepairDiscount(0,this)">0%</button>
            <button class="btn-discount" onclick="setRepairDiscount(25,this)">25%</button>
            <button class="btn-discount" onclick="setRepairDiscount(50,this)">50%</button>
            <button class="btn-discount" onclick="setRepairDiscount(75,this)">75%</button>
            <button class="btn-discount" onclick="setRepairDiscount(100,this)">100%</button>
        </div>

        <div class="result" id="r_preis">0€</div>

        <button onclick="calcRepair()">Quittung erstellen</button>
    </div>

</div>
</div>
</div>

<script>
function loginUser() {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if (u === "Mitarbeiter" && p === "Staff2026") {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
    } else {
        alert("Falsche Daten!");
    }
}

let discount = 0;
let repairDiscount = 0;

function setDiscount(val, btn) {
    discount = val;
    document.querySelectorAll('.discount-wrap')[0].querySelectorAll('button')
        .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    calcSale();
}

function calcSale() {
    let preis = parseFloat(v_preis.value) || 0;
    let end = preis - (preis * discount / 100);
    endpreis.innerText = end + "€";
}

function ankauf() {
    alert("Ankauf gespeichert");
}

function verkauf() {
    alert("Verkauf gespeichert");
}

function setRepairDiscount(val, btn) {
    repairDiscount = val;
    document.querySelectorAll('.discount-wrap')[1].querySelectorAll('button')
        .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    calcRepair();
}

function calcRepair() {
    let preis = (parseInt(r_anzahl.value) || 0) * 4000;
    let end = preis - (preis * repairDiscount / 100);
    r_preis.innerText = end + "€";
}
</script>

</body>
</html>
