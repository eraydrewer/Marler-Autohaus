<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>THE LUX SYSTEM</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #0b1020;
    color: #fff;
}

.header {
    padding: 20px;
    text-align: center;
    font-size: 26px;
    background: #111;
}

.login-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: #1a1a2e;
    padding: 30px;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    background: #222;
    color: white;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #3a6df0;
    border: none;
    color: white;
    cursor: pointer;
}

.app { display: none; }

.main { padding: 30px; }

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.card {
    background: #1a1a2e;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="login-screen" id="login">
    <div class="login-box">
        <h2>Login</h2>
        <input id="user" placeholder="Benutzername">
        <input id="pass" type="password" placeholder="Passwort">
        <button onclick="loginUser()">Einloggen</button>
    </div>
</div>

<div class="app" id="app">
<div class="header">🚗 THE LUX</div>

<div class="main">
<div class="container">

<div class="card">
    <h2>Ankauf</h2>
    <input id="a_auto" placeholder="Auto">
    <input id="a_chip" placeholder="Chip">
    <input id="a_preis" type="number" placeholder="Preis">
    <input id="a_vor" placeholder="Vorbesitzer">
    <input id="a_mit" placeholder="Mitarbeiter">
    <button onclick="ankauf()">Speichern</button>
</div>

<div class="card">
    <h2>Verkauf</h2>
    <input id="v_auto" placeholder="Auto">
    <input id="v_preis" type="number" placeholder="Preis">
    <input id="v_vor" placeholder="Kunde">
    <input id="v_mit" placeholder="Mitarbeiter">
    <button onclick="verkauf()">Speichern</button>
</div>

</div>
</div>
</div>

<script>
const WEBHOOK = "DEIN_WEBHOOK_HIER";

/* LOGIN */
function loginUser() {
    if (user.value === "Mitarbeiter" && pass.value === "Staff2026") {
        login.style.display = "none";
        app.style.display = "block";
    } else {
        alert("Falsch");
    }
}

/* DISCORD SEND */
async function send(embed) {
    await fetch(WEBHOOK, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({embeds: [embed]})
    });
}

/* ANKAUF */
function ankauf() {
    if (!a_auto.value || !a_preis.value) return alert("Fehlt!");

    const embed = {
        title: "🚗 Ankauf",
        color: 3447003,
        fields: [
            {name:"Auto", value:a_auto.value},
            {name:"Chip", value:a_chip.value || "Kein Chip"},
            {name:"Preis", value:a_preis.value + "€"},
            {name:"Vorbesitzer", value:a_vor.value},
            {name:"Mitarbeiter", value:a_mit.value}
        ],
        timestamp: new Date()
    };

    send(embed);
    alert("Gesendet!");
}

/* VERKAUF */
function verkauf() {
    if (!v_auto.value || !v_preis.value) return alert("Fehlt!");

    const embed = {
        title: "💰 Verkauf",
        color: 3066993,
        fields: [
            {name:"Auto", value:v_auto.value},
            {name:"Preis", value:v_preis.value + "€"},
            {name:"Kunde", value:v_vor.value},
            {name:"Mitarbeiter", value:v_mit.value}
        ],
        timestamp: new Date()
    };

    send(embed);
    alert("Gesendet!");
}
</script>

</body>
</html>
